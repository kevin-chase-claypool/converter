function tick(t) { if(!playing) return; const dt=t-lastTime; lastTime=t; let budget=dt*speedup; if(index>=DATA.moves.length) index=0; while(index<DATA.moves.length && budget>0){ budget -= Math.max(1, DATA.moves[index].duration_ms || 0); index++; } slider.value=index; draw(); if(index<DATA.moves.length) requestAnimationFrame(tick); else playing=false; }
function syncCommand() { document.querySelectorAll('.current').forEach(e=>e.classList.remove('current')); if(index<=0) return; const row=commands.querySelector('[data-i="'+(Math.min(index,DATA.moves.length)-1)+'"]'); if(row){row.classList.add('current'); row.scrollIntoView({block:'nearest'});} }
function updateStatus() { const m=DATA.moves[Math.max(0,Math.min(index-1,DATA.moves.length-1))] || {type:'start',end:[0,0]}; statusEl.textContent = `move ${index}/${DATA.moves.length} ${m.type} | X ${fmt((m.end||[0,0])[0])} Y ${fmt((m.end||[0,0])[1])} | bed theta ${fmt(activeTheta())} deg (${fmt(activeTheta()/360)} rev) | A motor ${fmt(activeMotor())} deg`; }
resize();
</script>
</body>
</html>
